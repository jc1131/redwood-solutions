version: 2

models:

  - name: dim_date
    description: >
      Calendar date dimension spanning 2024-01-01 to 2026-12-31. Enriched with
      fiscal period columns (dbt_date) and semi-monthly pay cycle columns
      (pay_date, pay_cycle_start, pay_cycle_end, next_pay_date).
    columns:
      - name: date_day
        description: "Calendar date — primary key."
        tests: [unique, not_null]

  - name: fact_commission_payout
    description: >
      Grain: one row per payout event (commission or bonus) per recruiter.
      Column order mirrors the 2026 Commission Report output. All business
      logic is resolved upstream in int_commission, int_bonus, and int_payout.
      This model joins int_payout to dim_date for the next payroll run date.
    columns:
      - name: commission_pk
        description: "Unique identifier for every commission row."
        tests: [unique, not_null]
      - name: recruiter_name
        description: "Recruiter receiving this commission."
        tests: [not_null]
      - name: commission_amount
        description: "Commission dollars — null for bonus rows."
      - name: guarantee_period_end
        description: >
          Commission pay date as resolved by hold-day rules.
          Represents the end of the guarantee/hold window
          ('3 or 4 mo Guarantee Period' in the report).
      - name: date_paid
        description: "Next payroll run date on or after guarantee_period_end."
      - name: is_valid_split
        description: >
          Data quality flag: true if all credit splits on the source invoice
          sum to 100%. Null for bonus rows.