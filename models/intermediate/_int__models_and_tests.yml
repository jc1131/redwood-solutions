version: 2

models:

  - name: int_invoice_detail
    description: >
      Grain: one row per (invoice × recruiter credit role).
      Unpivots the four credit-role column pairs from stg_commission_form__form_response
      into individual rows, filters out unused roles, resolves recruiter email via
      config_commission_relationship, and validates that splits sum to 100% per invoice.
      This is the only place the unpivot transformation lives.
    columns:
      - name: invoice_detail_pk
        description: "Surrogate PK scoped to (form_response_pk, recruiter_email, credit_role)."
        tests: [unique, not_null]
      - name: form_response_pk
        description: "FK to stg_commission_form__form_response."
        tests: [not_null]
      - name: recruiter_email
        description: "Canonical recruiter email resolved via config_commission_relationship."
      - name: credit_percentage
        description: "Fraction of the invoice credited to this recruiter for this role (0–1)."
      - name: credit_amount
        description: "Dollar amount credited: credit_percentage × invoice_amount."
      - name: is_valid_split
        description: "True if all active credit splits on this invoice sum to exactly 100%."

  - name: int_commission
    description: >
      Grain: one row per (invoice × recruiter).
      Aggregates multi-role splits, computes running YTD totals, applies tiered
      commission rates via a range join to config_commission, and resolves the
      commission pay date using hold-day rules and form_payment overrides.
    columns:
      - name: commission_pk
        description: "Surrogate PK scoped to (form_response_pk, recruiter_email, commission_number)."
        tests: [unique, not_null]
      - name: commission
        description: "Total commission dollars earned by this recruiter for this invoice."
      - name: commission_pay_date
        description: "Resolved pay date after applying hold-day rules and payment receipt overrides."
      - name: total_commission_sales
        description: "Recruiter's cumulative credited invoice amount YTD through this invoice."
      - name: total_invoice_ytd
        description: "Recruiter's cumulative gross invoice amount YTD through this invoice."